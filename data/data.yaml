# ============================================================
# YOLO11 地质灾害数据集配置
# ============================================================
# 数据集目录结构:
#   data/raw/
#   ├── data.yaml
#   ├── train/
#   │   ├── images/   ← 训练原图
#   │   └── labels/   ← YOLO 标注 (.txt)
#   ├── valid/
#   │   ├── images/   ← 验证原图
#   │   └── labels/   ← YOLO 标注 (.txt)
#   └── test/
#       ├── images/   ← 测试原图
#       └── labels/   ← YOLO 标注 (.txt)
# ============================================================

path: .                           # 数据集根目录 (与此 yaml 文件同目录)
train: data/raw/train/images           # 训练集图像路径
val: data/raw/valid/images             # 验证集图像路径
test: data/raw/test/images             # 测试集图像路径 (可选)

# 类别定义
nc: 4
names:
  0: fallen tree
  1: landslide
  2: road collapse
  3: stone
#  4: safe
